<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능특강 영어 — 내신 완벽 이해 노트</title>
<style>
  :root{
    --ink:#13233b; --ink-soft:#3a4a63; --paper:#f7f4ec; --paper-2:#fffdf8;
    --line:#d8d0bf; --accent:#b5462f; --accent-2:#1f5d5b; --gold:#9a7b2e;
    --chip:#ece4d4; --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 28px rgba(20,35,59,.08);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:860px;margin:0 auto;padding:0 18px 120px;}
  .bar{position:sticky;top:0;z-index:20;background:rgba(247,244,236,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 0;margin-bottom:8px;}
  .bar .inner{max-width:860px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .crumb{font-size:.86rem;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .crumb a{color:var(--accent);text-decoration:none;cursor:pointer;font-weight:600;}
  .crumb a:hover{text-decoration:underline;}
  .crumb .sep{color:var(--line);}
  .crumb .cur{color:var(--ink);font-weight:700;}
  .backbtn{font-size:.84rem;border:1px solid var(--line);background:var(--paper-2);color:var(--ink);border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:600;}
  .backbtn:hover{background:var(--chip);}
  header.top{padding:40px 0 26px;border-bottom:2px solid var(--ink);margin-bottom:8px;}
  .eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 12px;}
  header.top h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(1.9rem,5vw,2.9rem);line-height:1.12;margin:0 0 6px;font-weight:700;letter-spacing:-.01em;}
  header.top .sub{font-size:1.02rem;color:var(--ink-soft);margin:10px 0 0;}
  .grid{display:grid;gap:12px;margin:30px 0 0;}
  .card{display:flex;align-items:center;gap:16px;text-align:left;width:100%;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;cursor:pointer;box-shadow:var(--shadow);font-family:inherit;color:inherit;transition:transform .12s,border-color .12s;}
  .card:hover{transform:translateY(-2px);border-color:var(--accent);}
  .card .badge{font-family:Georgia,serif;font-weight:700;color:#fff;background:var(--accent);border-radius:10px;min-width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
  .card .badge.sm{font-size:.95rem;min-width:46px;height:46px;}
  .card .c-body{flex:1;min-width:0;}
  .card .c-title{font-size:1.08rem;font-weight:700;line-height:1.3;}
  .card .c-sub{font-size:.85rem;color:var(--ink-soft);margin-top:3px;}
  .card .c-tag{font-size:.72rem;color:var(--ink-soft);white-space:nowrap;border:1px solid var(--line);border-radius:20px;padding:3px 10px;}
  .card .arrow{color:var(--accent);font-size:1.2rem;flex-shrink:0;}
  .sec-label{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin:0;font-weight:700;}
  .p-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:28px 0 0;}
  .p-num{font-family:Georgia,serif;font-size:1.05rem;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:3px 11px;}
  .p-type{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .p-diff{margin-left:auto;font-size:.8rem;color:var(--ink-soft);}
  .p-diff b{color:var(--ink);}
  .p-title{font-family:Georgia,"Times New Roman",serif;font-size:clamp(1.3rem,3.4vw,1.7rem);line-height:1.22;margin:8px 0 0;font-weight:700;}
  .p-src{font-size:.82rem;color:var(--ink-soft);margin:8px 0 0;font-style:italic;}
  .flow{background:linear-gradient(180deg,var(--paper-2),#fbf8f1);border:1px solid var(--line);border-left:4px solid var(--accent-2);border-radius:12px;padding:18px 20px;margin:22px 0 8px;box-shadow:var(--shadow);}
  .flow .flow-lead{font-weight:700;color:var(--accent-2);font-size:1.05rem;margin:0 0 10px;}
  .flow ul{margin:0;padding-left:2px;list-style:none;display:grid;gap:9px;}
  .flow li{padding-left:20px;position:relative;font-size:.96rem;color:var(--ink-soft);}
  .flow li::before{content:"";position:absolute;left:0;top:.62em;width:7px;height:7px;border-radius:50%;background:var(--accent-2);}
  .flow li b{color:var(--ink);}
  h3.sec{font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin:34px 0 4px;padding-bottom:8px;border-bottom:1px dashed var(--line);font-weight:700;}
  .s{padding:20px 0;border-bottom:1px solid var(--line);}
  .s:last-child{border-bottom:none;}
  .s-en{font-family:Georgia,"Times New Roman",serif;font-size:1.06rem;line-height:1.55;color:var(--ink);margin:0 0 14px;font-weight:600;}
  .s-en .bul{display:inline-flex;align-items:center;justify-content:center;width:1.5em;height:1.5em;border-radius:50%;background:var(--ink);color:#fff;font-size:.72rem;font-weight:700;margin-right:8px;vertical-align:1px;font-family:system-ui;}
  .row{display:grid;grid-template-columns:64px 1fr;gap:6px 14px;margin:0 0 9px;align-items:start;}
  .row .lab{font-size:.74rem;font-weight:700;padding-top:2px;}
  .row .val{font-size:.97rem;color:var(--ink-soft);line-height:1.62;}
  .row.literal .lab{color:var(--accent-2);}
  .row.easy .lab{color:var(--ink);}
  .row.role .lab{color:#6a5aa6;}
  .row .val b{color:var(--ink);font-weight:700;}
  .point{margin:12px 0 2px;background:#fbf4e8;border:1px solid #e7d4a8;border-radius:10px;padding:12px 14px;font-size:.93rem;color:#5d4a1e;}
  .point .ptag{display:inline-block;font-weight:700;color:var(--gold);margin-right:6px;}
  .point.answer{background:#fbe9e3;border-color:#e8b6a6;color:#7a2e1a;}
  .point.answer .ptag{color:var(--accent);}
  details.vocab{margin:18px 0 0;border:1px solid var(--line);border-radius:12px;background:var(--paper-2);overflow:hidden;}
  details.vocab summary{cursor:pointer;padding:13px 18px;font-weight:700;font-size:.92rem;color:var(--ink);list-style:none;display:flex;align-items:center;gap:8px;}
  details.vocab summary::-webkit-details-marker{display:none;}
  details.vocab summary::before{content:"▸";color:var(--accent);transition:transform .2s;}
  details.vocab[open] summary::before{transform:rotate(90deg);}
  .vlist{padding:4px 18px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px 22px;}
  .vlist div{font-size:.9rem;display:flex;gap:10px;border-bottom:1px dotted var(--line);padding:5px 0;}
  .vlist .w{font-family:Georgia,serif;color:var(--ink);font-weight:600;min-width:96px;}
  .vlist .m{color:var(--ink-soft);}
  .pn{display:flex;gap:10px;margin-top:30px;}
  .pn button{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;font-family:inherit;color:inherit;text-align:left;}
  .pn button:hover{border-color:var(--accent);}
  .pn button:disabled{opacity:.35;cursor:default;}
  .pn .dir{font-size:.72rem;color:var(--accent);font-weight:700;letter-spacing:.1em;}
  .pn .pt{font-size:.9rem;font-weight:600;margin-top:3px;line-height:1.3;}
  .pn .nx{text-align:right;}
  footer.foot{margin-top:56px;padding-top:24px;border-top:2px solid var(--ink);font-size:.82rem;color:var(--ink-soft);}
  @media (max-width:560px){.row{grid-template-columns:54px 1fr;} .p-diff{margin-left:0;width:100%;}}
</style>
</head>

  view={level:'home'}; bar.style.display='none'; window.scrollTo(0,0);
  let cards=DATA.map((g,i)=>`<button class="card" onclick="showGang(${i})"><span class="badge">${g.id}</span><span class="c-body"><span class="c-title">${g.title.replace(/^\d+강\s*—\s*/,'')}</span><span class="c-sub">${g.sub}</span></span><span class="c-tag">${g.passages.length}지문</span><span class="arrow">→</span></button>`).join('');
  app.innerHTML=`<header class="top"><p class="eyebrow">2027학년도 수능특강 영어 · 내신 완벽 이해</p><h1>지문 완벽 이해 노트</h1><p class="sub">강을 고르고, 지문을 골라, 문장별 정밀 해설로 내용을 끝까지 이해하세요.</p></header><p class="sec-label" style="margin-top:30px;">강 선택</p><div class="grid">${cards}</div><footer class="foot">강은 계속 추가됩니다. 각 지문은 직역·쉬운 의미·역할로 한 문장씩 풀이됩니다.</footer>`;
}
function showGang(gi){
  view={level:'gang',gi}; const g=DATA[gi]; bar.style.display=''; window.scrollTo(0,0);
  crumb.innerHTML=`<a onclick="showHome()">강 목록</a><span class="sep">›</span><span class="cur">${g.id}강</span>`;
  let cards=g.passages.map((p,i)=>`<button class="card" onclick="showPassage(${gi},${i})"><span class="badge sm">${p.num}</span><span class="c-body"><span class="c-title">${p.title}</span><span class="c-sub">${p.type}${p.diff?' · 난이도 '+p.diff:''}</span></span><span class="arrow">→</span></button>`).join('');
  app.innerHTML=`<header class="top"><p class="eyebrow">2027 수능특강 영어</p><h1>${g.title.replace(/^\d+강\s*—\s*/,g.id+'강 · ')}</h1><p class="sub">${g.sub}</p></header><p class="sec-label" style="margin-top:30px;">지문 선택</p><div class="grid">${cards}</div>`;
}
function showPassage(gi,pi){
  view={level:'passage',gi,pi}; const g=DATA[gi],p=g.passages[pi]; bar.style.display=''; window.scrollTo(0,0);
  crumb.innerHTML=`<a onclick="showHome()">강 목록</a><span class="sep">›</span><a onclick="showGang(${gi})">${g.id}강</a><span class="sep">›</span><span class="cur">${p.num}번</span>`;
  let flow=`<div class="flow"><p class="flow-lead">${p.flowLead}</p><ul>${p.flow.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  let sents=p.sents.map(s=>{
    let en=s.en.replace(/⟦(.*?)⟧/g,'<span class="bul">$1</span>');
    let pt=s.point?`<div class="point ${s.ptcls||''}"><span class="ptag">${s.ptcls==='answer'?'빈칸 포인트':'짚고 가기'}</span> ${s.point}</div>`:'';
    return `<div class="s"><p class="s-en">${en}</p><div class="row literal"><div class="lab">직역</div><div class="val">${s.lit}</div></div><div class="row easy"><div class="lab">쉬운 의미</div><div class="val">${s.easy}</div></div><div class="row role"><div class="lab">역할</div><div class="val">${s.role}</div></div>${pt}</div>`;
  }).join('');
  let vocab=p.vocab.length?`<details class="vocab"><summary>Vocabulary</summary><div class="vlist">${p.vocab.map(v=>`<div><span class="w">${v[0]}</span><span class="m">${v[1]}</span></div>`).join('')}</div></details>`:'';
  const prev=pi>0?g.passages[pi-1]:null, next=pi<g.passages.length-1?g.passages[pi+1]:null;
  let nav=`<div class="pn"><button ${prev?'':'disabled'} ${prev?`onclick="showPassage(${gi},${pi-1})"`:''}><div class="dir">← 이전</div><div class="pt">${prev?prev.num+'. '+prev.title:'처음'}</div></button><button class="nx" ${next?'':'disabled'} ${next?`onclick="showPassage(${gi},${pi+1})"`:''}><div class="dir">다음 →</div><div class="pt">${next?next.num+'. '+next.title:'마지막'}</div></button></div>`;
  app.innerHTML=`<div class="p-head"><span class="p-num">${p.num}</span><span class="p-type">${p.type}</span>${p.diff?`<span class="p-diff">난이도 <b>${p.diff}</b></span>`:''}</div><h2 class="p-title">${p.title}</h2>${p.src?`<p class="p-src">${p.src}</p>`:''}${flow}<h3 class="sec">문장별 완벽 풀이</h3>${sents}${vocab}${nav}`;
}
showHome();
</script>
</body>
</html>
